name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Create .env for build
        run: |
          @"
          GDRIVE_CLIENT_ID=${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET=${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_ANDROID_CLIENT_ID=${{ secrets.GDRIVE_ANDROID_CLIENT_ID }}
          MS_CLIENT_ID=${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET=${{ secrets.MS_CLIENT_SECRET }}
          "@ | Out-File -FilePath .env -Encoding utf8
        shell: pwsh

      - name: Build Windows release
        run: flutter build windows --release --dart-define-from-file=.env

      - name: Create Inno Setup installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
        with:
          path: installer/windows/setup.iss

      - name: Upload setup.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: lifeos-anywhere-windows-setup
          path: build/installer/LifeOS-AnyWhere-Setup-*.exe
          retention-days: 30
