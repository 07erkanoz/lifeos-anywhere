name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Create .env for build
        run: |
          cat > .env <<'EOF'
          GDRIVE_CLIENT_ID=${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET=${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_ANDROID_CLIENT_ID=${{ secrets.GDRIVE_ANDROID_CLIENT_ID }}
          MS_CLIENT_ID=${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET=${{ secrets.MS_CLIENT_SECRET }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          REVENUECAT_API_KEY=${{ secrets.REVENUECAT_API_KEY }}
          TURN_USERNAME=${{ secrets.TURN_USERNAME }}
          TURN_CREDENTIAL=${{ secrets.TURN_CREDENTIAL }}
          EOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../upload-keystore.jks
          EOF
          sed -i 's/^[[:space:]]*//' android/key.properties

      - name: Build APK
        run: flutter build apk --release --dart-define-from-file=.env

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build #${{ github.run_number }}
          body: "Automated build from commit ${{ github.sha }}"
          files: build/app/outputs/flutter-apk/app-release.apk
          make_latest: true
